<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <!-- favicon is used to add a small icon to the browser tab -->
    <link rel="shortcut icon" href="car.jpg" type="image/x-icon">
    <style>
        table {
            border-collapse: collapse;

        }
    </style>
</head>

<body>
    <table border="2" cellpadding="10" cellspacing="30">
        <caption>
            Students</caption>
        <thead>
            <tr>

                <th>Name</th>
                <th>Course </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2"> Nancy</td>
                <td> Btech</td>

            </tr>
            <tr>
                <td> Riya</td>
                <td rowspan="2"> Bca</td>

            </tr>
        </tbody>
    </table>

    <br>
    <hr>
    <br>
    <!-- iframe is used to embed video codes -->
    <iframe src="https://www.youtube.com/embed/bO5DloC3mpI" width="800" height="400"
        title="Sweet Moments - Jungle Beat | Munki and Trunk | WildBrain Fizz | Full Episodes | Kids Cartoon 2024"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <br>
    <hr>

    <video src="bird video.mp4" width="300" height="200" controls muted autoplay loop></video>
    <!-- controls is used to add play, pause, and volume controls to the video 
 and autoplay works only when the video is muted 
 and loop is stated just after the mute-->
    <br> <br>
    <hr>
    <br>

    <audio src="flute audio.mp3" controls>Flute audio</audio>

    <br>
    <hr>
    <br>
    <details>
        <summary>Click to expand</summary>
        <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Mollitia repudiandae itaque
            quisquam blanditiis quidem sint atque dicta accusantium, ut pariatur?
        </p>
    </details>
    <address> <!-- address written in italics by default-->
        <p>123 Main Street<br>
            Anytown, USA 12345</p>
    </address>
    <hr>
    <dialog open>
        Hello bestieesssss
    </dialog> <!-- dialog is used to create a dialog box 
    and open attribute is used to display the dialog box in center by default -->
    <br> <br> <br>

    <br>
    <!--marquee is used to create a moving text effect and
    marquee behaviour can be "scroll", "slide", or "alternate" -->
    <marquee behaviour="alternate" direction="right" bgcolor="lightgreen" scrollamount="10" vsapce="20" hsapce="30">
        Good morning😁</marquee>
</body>

</html>
